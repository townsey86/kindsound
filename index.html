<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 KindSound</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:40px;
    }

    h1 {
      font-size:48px;
    }

    textarea {
      width:320px;
      height:100px;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:16px;
      margin-top:20px;
      resize:none;
    }

    select {
      margin-top:20px;
      padding:12px;
      border:none;
      border-radius:12px;
      font-size:16px;
    }

    button {
      background:#22c55e;
      color:black;
      padding:14px 24px;
      border:none;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      margin-top:20px;
      cursor:pointer;
    }

    #kindnessContainer {
      margin-top:30px;
    }

    #meterBackground {
      width:300px;
      height:30px;
      background:#1e293b;
      border-radius:20px;
      margin:20px auto;
      overflow:hidden;
    }

    #meterFill {
      height:100%;
      width:0%;
      background:#22c55e;
      transition:width 0.5s ease;
    }

    #kindnessScore {
      font-size:24px;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <h1>💌 KindSound</h1>

  <textarea id="message" placeholder="Type something kind..."></textarea>

  <br>

  <select id="style">
    <option value="lofi">🌊 Lo-Fi</option>
    <option value="edm">🎉 EDM</option>
    <option value="ambient">😌 Ambient</option>
    <option value="hiphop">🥁 Hip Hop</option>
  </select>

  <br>

  <button onclick="generate()">Generate Kindness</button>

  <div id="kindnessContainer">
    <h2>💚 Kindness Meter</h2>
    <div id="meterBackground">
      <div id="meterFill"></div>
    </div>
    <p id="kindnessScore">0%</p>
  </div>

  <script src="https://unpkg.com/tone"></script>

  <script>

    let drumLoop, chordLoop, melodyLoop
    let drum, chordSynth, melodySynth

    window.generate = async function() {

      await Tone.start()

      Tone.Transport.stop()
      Tone.Transport.cancel()

      // ======================
      // INPUT
      // ======================

      const message =
        document.getElementById("message").value || "be kind"

      const style =
        document.getElementById("style").value

      // ======================
      // KINDNESS SCORE
      // ======================

      const kindWords = [
        "love","amazing","appreciate",
        "kind","support","great","beautiful"
      ]

      let kindness = Math.min(100,
        message.length +
        (message.includes("!") ? 15 : 0)
      )

      kindWords.forEach(w => {
        if (message.toLowerCase().includes(w)) {
          kindness += 10
        }
      })

      kindness = Math.min(100, kindness)

      document.getElementById("meterFill").style.width =
        kindness + "%"

      document.getElementById("kindnessScore").innerText =
        kindness + "%"

      // ======================
      // DRUMS
      // ======================

      drum = new Tone.MembraneSynth().toDestination()

      drumLoop = new Tone.Loop(time => {

        drum.triggerAttackRelease(
          "C1",
          "8n",
          time
        )

      }, "4n")

      // ======================
      // CHORDS
      // ======================

      chordSynth = new Tone.PolySynth().toDestination()

      const chords = [
        ["C3","E3","G3"],
        ["A3","C4","E4"],
        ["F3","A3","C4"],
        ["G3","B3","D4"]
      ]

      let cIndex = 0

      chordLoop = new Tone.Loop(time => {

        chordSynth.triggerAttackRelease(
          chords[cIndex % chords.length],
          "2n",
          time
        )

        cIndex++

      }, "1m")

      // ======================
      // MELODY (NON-REPETITIVE)
      // ======================

      melodySynth = new Tone.Synth().toDestination()

      let notes = [
        "C4","E4","G4","B4",
        "A4","D4","F4","G4"
      ]

      melodyLoop = new Tone.Loop(time => {

        let note =
          notes[Math.floor(Math.random() * notes.length)]

        if (!note) return

        melodySynth.triggerAttackRelease(
          note,
          "8n",
          time
        )

      }, "8n")

      // ======================
      // START ALL
      // ======================

      drumLoop.start(0)
      chordLoop.start(0)
      melodyLoop.start(0)

      Tone.Transport.bpm.value = 80 + kindness
      Tone.Transport.start()

    }

  </script>

</body>

</html>
