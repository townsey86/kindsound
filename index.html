<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>💌 KindSound</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:40px;
    }

    h1 {
      font-size:48px;
      margin-bottom:10px;
    }

    p {
      color:#cbd5e1;
    }

    textarea {
      width:320px;
      height:100px;

      padding:15px;

      border:none;
      border-radius:12px;

      font-size:16px;

      margin-top:20px;

      resize:none;
    }

    select {

      margin-top:20px;

      padding:12px;

      border:none;
      border-radius:12px;

      font-size:16px;

    }

    button {

      background:#22c55e;
      color:black;

      padding:14px 24px;

      border:none;
      border-radius:12px;

      font-size:18px;
      font-weight:bold;

      margin-top:20px;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover {
      transform:scale(1.05);
      opacity:0.9;
    }

    button:active {
      transform:scale(0.98);
    }

    #kindnessContainer {
      margin-top:30px;
    }

    #meterBackground {

      width:300px;
      height:30px;

      background:#1e293b;

      border-radius:20px;

      margin:20px auto;

      overflow:hidden;

    }

    #meterFill {

      height:100%;
      width:0%;

      background:#22c55e;

      transition:width 0.5s ease;

    }

    #kindnessScore {

      font-size:24px;
      font-weight:bold;

    }

    .visual {

      margin-top:40px;

      height:120px;

      border-radius:20px;

      background:
        radial-gradient(circle, #22c55e, transparent);

      animation:pulse 2s infinite;

    }

    @keyframes pulse {

      0% {
        opacity:0.5;
        transform:scale(1);
      }

      50% {
        opacity:1;
        transform:scale(1.03);
      }

      100% {
        opacity:0.5;
        transform:scale(1);
      }

    }

  </style>

</head>

<body>

  <h1>💌 KindSound</h1>

  <p>
    Turn kindness into music
  </p>

  <textarea
    id="message"
    placeholder="Type something kind..."
  ></textarea>

  <br>

  <select id="style">

    <option value="lofi">
      🌊 Lo-Fi
    </option>

    <option value="edm">
      🎉 EDM
    </option>

    <option value="ambient">
      😌 Ambient
    </option>

    <option value="hiphop">
      🥁 Hip Hop
    </option>

  </select>

  <br>

  <button onclick="generate()">
    Generate Kindness
  </button>

  <div id="kindnessContainer">

    <h2>💚 Kindness Meter</h2>

    <div id="meterBackground">
      <div id="meterFill"></div>
    </div>

    <p id="kindnessScore">
      0%
    </p>

  </div>

  <div class="visual"></div>

  <!-- STRUDEL -->
  <script src="https://unpkg.com/tone"></script>

<script>

let synth
let loop

window.generate = async function() {

  await Tone.start()

  // stop previous loop
  if (loop) {
    loop.dispose()
  }

  // ==========================
  // INPUTS
  // ==========================

  const message =
    document.getElementById("message").value
    || "be kind"

  const style =
    document.getElementById("style").value

  // ==========================
  // KINDNESS ANALYSIS
  // ==========================

  const lengthScore = message.length

  const excitement =
    message.includes("!") ? 1 : 0

  const kindWords = [
    "love",
    "amazing",
    "appreciate",
    "proud",
    "kind",
    "great",
    "beautiful",
    "support"
  ]

  let kindnessScore = 0

  kindnessScore +=
    Math.min(40, lengthScore)

  if (excitement) {
    kindnessScore += 15
  }

  kindWords.forEach(word => {

    if (
      message.toLowerCase().includes(word)
    ) {
      kindnessScore += 10
    }

  })

  kindnessScore =
    Math.min(100, kindnessScore)

  // ==========================
  // UPDATE METER
  // ==========================

  document.getElementById("meterFill")
    .style.width =
    kindnessScore + "%"

  document.getElementById("kindnessScore")
    .innerText =
    kindnessScore + "%"

  // ==========================
  // MUSIC SETTINGS
  // ==========================

  let notes

  if (style === "lofi") {

    synth =
      new Tone.PolySynth(Tone.Synth).toDestination()

    notes = ["C3", "E3", "G3", "B3"]

  }

  else if (style === "edm") {

    synth =
      new Tone.PolySynth(Tone.FMSynth).toDestination()

    notes = ["C4", "G4", "A4", "E4"]

  }

  else if (style === "ambient") {

    synth =
      new Tone.PolySynth(Tone.AMSynth).toDestination()

    notes = ["C2", "G2", "B2", "E3"]

  }

  else if (style === "hiphop") {

    synth =
      new Tone.PolySynth(Tone.MembraneSynth).toDestination()

    notes = ["C3", "G3", "A3", "E3"]

  }

  // ==========================
  // TEMPO
  // ==========================

  Tone.Transport.bpm.value =
    70 + kindnessScore

  // ==========================
  // PLAY LOOP
  // ==========================

  let index = 0

  loop = new Tone.Loop(time => {

    synth.triggerAttackRelease(
      notes[index % notes.length],
      "8n",
      time
    )

    index++

  }, "4n").start(0)

  Tone.Transport.start()

}

</script>
</body>

</html>
