<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KindSound Evolution</title>

<style>

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  font-family:Arial;
  text-align:center;
  padding:40px;
}

h1 {
  font-size:48px;
}

textarea {
  width:320px;
  height:100px;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:15px;
}

select, button {
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:16px;
}

button {
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  transform:scale(1.05);
}

#meter {
  width:300px;
  height:25px;
  background:#1e293b;
  border-radius:20px;
  margin:20px auto;
  overflow:hidden;
}

#fill {
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}

.visual {
  width:120px;
  height:120px;
  margin:25px auto;
  border-radius:50%;
  background: radial-gradient(circle, #22c55e, transparent);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:0.4; }
  50% { transform:scale(1.25); opacity:1; }
  100% { transform:scale(1); opacity:0.4; }
}

.slider {
  width:200px;
  margin-top:15px;
}

</style>
</head>

<body>

<h1>💌 KindSound Evolution</h1>

<textarea id="msg" placeholder="Type something kind..."></textarea>

<br>

<select id="style">
  <option value="lofi">🌊 Lo-Fi</option>
  <option value="edm">🎉 EDM</option>
  <option value="ambient">😌 Ambient</option>
  <option value="hiphop">🥁 Hip Hop</option>
</select>

<br>

<button onclick="generate()">Generate</button>

<br><br>

<label>🔊 Volume</label><br>
<input type="range" min="0" max="1" step="0.01"
value="0.8" class="slider"
oninput="setVolume(this.value)">

<div class="visual"></div>

<div id="meter">
  <div id="fill"></div>
</div>

<p id="score">0%</p>

<script src="https://unpkg.com/tone"></script>

<script>

let master, limiter
let drumLoop, chordLoop, melodyLoop
let drum, chord, melody

let kindness = 0

// ======================
// VOLUME CONTROL
// ======================

function setVolume(v) {
  if (master) {
    master.gain.rampTo(v, 0.1)
  }
}

// ======================
// CLEANUP
// ======================

function cleanup() {

  Tone.Transport.stop()
  Tone.Transport.cancel()

  if (drumLoop) drumLoop.dispose()
  if (chordLoop) chordLoop.dispose()
  if (melodyLoop) melodyLoop.dispose()

  if (drum) drum.dispose()
  if (chord) chord.dispose()
  if (melody) melody.dispose()

}

// ======================
// MAIN
// ======================

window.generate = async function() {

  await Tone.start()

  // master chain (FIXED)
  if (!master) {
    master = new Tone.Gain(0.8)
    limiter = new Tone.Limiter(-6)
    master.connect(limiter)
    limiter.toDestination()
  }

  cleanup()

  // ======================
  // INPUT + KINDNESS
  // ======================

  const msg = document.getElementById("msg").value || "be kind"
  const style = document.getElementById("style").value

  const words = ["love","kind","great","amazing","support","appreciate"]

  kindness =
    Math.min(100,
      msg.length +
      (msg.includes("!") ? 15 : 0)
    )

  words.forEach(w => {
    if (msg.toLowerCase().includes(w)) kindness += 10
  })

  kindness = Math.min(100, kindness)

  document.getElementById("fill").style.width = kindness + "%"
  document.getElementById("score").innerText = kindness + "%"

  Tone.Transport.bpm.value = 60 + kindness

  // ======================
  // STYLE ENGINE (FIXED SOUND DIFFERENCE)
  // ======================

  if (style === "lofi") {

    drum = new Tone.MembraneSynth().connect(master)

    chord = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sine" }
    }).connect(master)

    melody = new Tone.Synth({
      oscillator: { type: "triangle" }
    }).connect(master)

  }

  else if (style === "edm") {

    drum = new Tone.MembraneSynth().connect(master)

    chord = new Tone.PolySynth(Tone.FMSynth).connect(master)

    melody = new Tone.Synth({
      oscillator: { type: "square" }
    }).connect(master)

  }

  else if (style === "ambient") {

    drum = new Tone.MembraneSynth().connect(master)

    chord = new Tone.PolySynth(Tone.AMSynth).connect(master)

    melody = new Tone.Synth({
      oscillator: { type: "sine" }
    }).connect(master)

  }

  else if (style === "hiphop") {

    drum = new Tone.MembraneSynth().connect(master)

    chord = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "square" }
    }).connect(master)

    melody = new Tone.Synth({
      oscillator: { type: "pulse" }
    }).connect(master)

  }

  // ======================
  // DRUMS (evolving)
  // ======================

  drumLoop = new Tone.Loop(time => {

    if (Math.random() > (kindness > 50 ? 0.3 : 0.6)) {
      drum.triggerAttackRelease("C1","8n",time)
    }

  }, "4n")

  // ======================
  // CHORDS
  // ======================

  const chords = [
    ["C3","E3","G3"],
    ["A3","C4","E4"],
    ["F3","A3","C4"],
    ["G3","B3","D4"]
  ]

  let i = 0

  chordLoop = new Tone.Loop(time => {

    chord.triggerAttackRelease(
      chords[i % chords.length],
      "2n",
      time
    )

    i++

  }, "1m")

  // ======================
  // MELODY (adaptive)
  // ======================

  let baseNotes =
    kindness > 60
      ? ["C4","E4","G4","A4","B4"]
      : ["C3","D3","E3","G3"]

  melodyLoop = new Tone.Loop(time => {

    let pool =
      kindness > 70
        ? baseNotes.concat(["D5","F5"])
        : baseNotes

    let note =
      pool[Math.floor(Math.random()*pool.length)]

    melody.triggerAttackRelease(note,"8n",time)

  }, kindness > 60 ? "8n" : "4n")

  // ======================
  // EVOLUTION SYSTEM
  // ======================

  Tone.Transport.scheduleRepeat(() => {

    kindness = Math.min(100, kindness + 0.2)

    Tone.Transport.bpm.rampTo(50 + kindness, 2)

  }, "2n")

  // ======================
  // START
  // ======================

  drumLoop.start(0)
  chordLoop.start(0)
  melodyLoop.start(0)

  Tone.Transport.start()

}

</script>

</body>
</html>
